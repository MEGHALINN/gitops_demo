apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: node:18-alpine
        command: ["sh", "-c"]
        args:
          - |
            npm install express &&
            node -e "
            const express = require('express');
            const app = express();
            app.get('/', (req,res)=>res.send('Hello from Backend 🚀'));
            app.listen(3000);"
        ports:
        - containerPort: 3000
